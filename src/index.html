<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loidnet</title>
  <link rel="stylesheet" href="renderer/style.css">
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <button id="btn-new" title="New Project">New</button>
      <button id="btn-open" title="Open Project">Open</button>
      <button id="btn-save" title="Save Project">Save</button>
    </div>
    <div class="toolbar-group">
      <button id="btn-play" title="Play">&#9654; Play</button>
      <button id="btn-stop" title="Stop">&#9632; Stop</button>
      <button id="btn-render" title="Render to audio">Render</button>
      <button id="btn-export" title="Export WAV">Export WAV</button>
    </div>
    <div class="toolbar-group">
      <label for="select-tool">Tool:</label>
      <select id="select-tool">
        <option value="pointer">Pointer</option>
        <option value="pencil" selected>Pencil</option>
        <option value="eraser">Eraser</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label for="tempo">BPM:</label>
      <input type="number" id="tempo" value="120" min="20" max="300" step="1">
    </div>
    <div class="toolbar-group">
      <label for="select-voicebank">Voice:</label>
      <select id="select-voicebank">
        <option value="">No voicebank</option>
      </select>
    </div>
    <div class="toolbar-group status">
      <span id="status-text">Ready</span>
    </div>
  </div>

  <div id="editor-container">
    <div id="piano-roll-wrapper">
      <canvas id="piano-keys" width="60"></canvas>
      <canvas id="piano-roll"></canvas>
    </div>
    <div id="param-tabs">
      <button class="param-tab active" data-param="pitch">Pitch</button>
      <button class="param-tab" data-param="breathiness">Breath</button>
      <button class="param-tab" data-param="tension">Tension</button>
      <button class="param-tab" data-param="voicing">Voicing</button>
      <button class="param-tab" data-param="energy">Energy</button>
    </div>
    <div id="param-editor-wrapper">
      <canvas id="param-editor"></canvas>
    </div>
  </div>

  <input type="text" id="lyric-input" style="display:none" spellcheck="false">

  <script src="renderer/phonemizer.js"></script>
  <script src="renderer/note.js"></script>
  <script src="renderer/piano-roll.js"></script>
  <script src="renderer/param-editor.js"></script>
  <script src="renderer/score.js"></script>
  <script src="renderer/app.js"></script>
</body>
</html>
